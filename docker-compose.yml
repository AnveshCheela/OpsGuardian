version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: opsguardian-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: opsguardian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: opsguardian-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  maildev:
    image: maildev/maildev:latest
    container_name: opsguardian-maildev
    restart: always
    ports:
      - "1080:1080" # Web UI
      - "1025:1025" # SMTP Port

  alert-simulator:
    build: ./alert-simulator
    container_name: opsguardian-alert-simulator
    restart: always
    ports:
      - "3333:3333"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:

